<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FitTrack</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#FAFAF9;color:#1C1917;overflow-x:hidden}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:0}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#FAFAF9}
.topbar{padding:16px 16px 12px;background:#fff;border-bottom:1px solid #E7E5E4;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar h2{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.topbar .sub{font-size:11px;color:#A8A29E;font-weight:500;margin-top:1px}
.week-badge{display:flex;align-items:center;gap:4px;padding:4px 10px;background:#F5F0EB;border-radius:8px;font-size:12px;font-weight:600;color:#7C6F64}
.content{padding:16px 16px 100px}
.tab-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E7E5E4;display:flex;z-index:50;padding-bottom:max(env(safe-area-inset-bottom),8px)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 6px;gap:2px;background:none;border:none;color:#A8A29E;transition:color .2s}
.tab-btn.active{color:#7C6F64}
.tab-btn svg{width:20px;height:20px}
.tab-btn span{font-size:10px;letter-spacing:.3px}
.tab-btn.active span{font-weight:600}
/* Cards */
.ex-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid #E7E5E4;transition:all .3s}
.ex-card.done{opacity:.7;border-color:#C8DFC9}
.ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ex-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.ex-meta{font-size:12px;color:#A8A29E;margin-top:2px}
.ex-info-btn{background:none;border:none;color:#A8A29E;padding:2px}
.wt-input{width:56px;padding:6px 8px;border-radius:8px;border:1px solid #E7E5E4;font-size:13px;text-align:center;background:#FAFAF9;color:#1C1917;outline:none}
.set-row{display:flex;gap:6px}
.set-btn{flex:1;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid #E7E5E4;background:#FAFAF9;color:#57534E;font-size:12px;font-weight:500;transition:all .2s}
.set-btn.checked{background:#6B8F71;color:#fff;border:none}
/* Progress bar */
.prog-bar{margin-top:14px;background:#F5F5F4;border-radius:6px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:6px;transition:width .4s ease}
/* Schedule */
.sched-btn{display:flex;align-items:center;width:100%;padding:14px 16px;background:#fff;border-radius:12px;margin-bottom:8px;border:1px solid #E7E5E4;text-align:left;transition:background .2s}
.sched-btn.today{background:#F5F0EB;border:1.5px solid #D6CFC7}
.sched-icon{font-size:24px;margin-right:14px}
.sched-day{font-size:13px;color:#A8A29E;font-weight:500}
.sched-label{font-size:15px;font-weight:600;margin-top:2px}
.sched-detail{font-size:12px;color:#A8A29E;margin-top:4px}
.today-badge{font-size:11px;font-weight:600;color:#7C6F64;background:#fff;padding:3px 8px;border-radius:6px;margin-right:8px}
/* Guide */
.guide-day{margin-bottom:8px}
.guide-day-btn{display:flex;align-items:center;width:100%;padding:12px 16px;background:#fff;border-radius:12px;border:1px solid #E7E5E4;text-align:left}
.guide-day-btn.open{border-radius:12px 12px 0 0;border-bottom:none}
.guide-list{background:#fff;border:1px solid #E7E5E4;border-top:none;border-radius:0 0 12px 12px;overflow:hidden}
.guide-item{display:flex;align-items:center;width:100%;padding:12px 16px;background:none;border:none;border-top:1px solid #F5F5F4;text-align:left;cursor:pointer}
.guide-item:first-child{border-top:none}
/* Modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.center{align-items:center}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal-center{background:#fff;border-radius:20px;padding:32px 28px;width:calc(100% - 48px);max-width:320px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-close{background:#FAFAF9;border:none;border-radius:10px;padding:8px;color:#57534E;cursor:pointer}
.guide-section{border-radius:12px;padding:16px;margin-bottom:16px}
.guide-section h4{font-size:13px;font-weight:600;margin:0 0 8px;text-transform:uppercase;letter-spacing:.5px}
.guide-section p{font-size:14px;line-height:1.7;margin:0}
/* Track */
.toggle-bar{display:flex;background:#FAFAF9;border-radius:10px;padding:3px;margin-bottom:20px;border:1px solid #E7E5E4}
.toggle-btn{flex:1;padding:8px 0;border-radius:8px;font-size:13px;font-weight:500;border:none;background:transparent;color:#A8A29E;cursor:pointer}
.toggle-btn.active{background:#fff;color:#1C1917;border:1px solid #E7E5E4;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.log-card{background:#fff;border-radius:14px;padding:20px;border:1px solid #E7E5E4;margin-bottom:16px}
.log-row{display:flex;gap:10px;margin-bottom:14px}
.log-field{flex:1}
.log-field label{font-size:12px;color:#A8A29E;margin-bottom:4px;display:block}
.log-field input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #E7E5E4;font-size:15px;background:#FAFAF9;color:#1C1917;outline:none}
.save-btn{width:100%;padding:12px;border-radius:10px;background:#7C6F64;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer}
.entry-row{display:flex;justify-content:space-between;padding:10px 14px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid #E7E5E4}
.protein-box{background:#EDF5EE;border-radius:12px;padding:16px;margin-top:16px}
.protein-box .title{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.protein-box .title span{font-size:13px;font-weight:600;color:#6B8F71}
.protein-box p{font-size:13px;line-height:1.6;margin:0}
/* Chart area */
.chart-card{background:#fff;border-radius:14px;padding:16px;border:1px solid #E7E5E4;margin-bottom:16px}
.chart-card h3{font-size:14px;font-weight:600;margin:0 0 12px}
/* History */
.hist-item{background:#fff;border-radius:12px;border:1px solid #E7E5E4;margin-bottom:8px;overflow:hidden}
.hist-btn{display:flex;align-items:center;width:100%;padding:14px 16px;background:none;border:none;text-align:left;cursor:pointer}
.hist-badge{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.hist-detail{padding:0 16px 14px;border-top:1px solid #F5F5F4}
.hist-ex{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F5F5F4;font-size:13px}
.hist-ex:last-child{border-bottom:none}
/* Rest timer */
.timer-ring{transition:stroke-dashoffset 1s linear,stroke .3s}
/* Empty state */
.empty{padding:60px 24px;text-align:center}
.empty h2{font-size:18px;font-weight:600;color:#57534E;margin:12px 0 6px}
.empty p{font-size:14px;color:#A8A29E}
/* Rest timer select */
.rest-sel{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.rest-sel span{font-size:12px;color:#A8A29E}
.rest-opt{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500;border:1px solid #E7E5E4;background:#FAFAF9;color:#57534E;cursor:pointer}
.rest-opt.active{background:#7C6F64;color:#fff;border-color:#7C6F64}
.rest-actions{display:flex;gap:12px;justify-content:center;margin-top:24px}
.rest-actions button{display:flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;border:1px solid #E7E5E4;background:#FAFAF9;font-size:13px;font-weight:500;color:#1C1917;cursor:pointer}
/* SVG charts */
svg text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ─── DATA ───
const PLAN=[
{day:"Monday",label:"Back / Biceps",icon:"\u{1F4AA}",exercises:[
{n:"Lat Pulldown",s:4,r:"10-12",m:"Lats",g:"Sit with thighs secured under pads. Grip the bar slightly wider than shoulder width. Pull the bar down to your upper chest, squeezing your shoulder blades together. Control the weight back up slowly.",t:"Don't lean too far back. Focus on pulling with your elbows, not your hands."},
{n:"Seated Cable Row",s:4,r:"10-12",m:"Mid Back",g:"Sit upright with feet on the platform and knees slightly bent. Pull the handle to your lower chest, keeping elbows close to your body. Squeeze your back at the peak, then slowly extend.",t:"Keep your torso still — avoid rocking back and forth to generate momentum."},
{n:"Single-Arm Dumbbell Row",s:3,r:"10 each",m:"Lats, Rhomboids",g:"Place one knee and hand on a bench. Hold a dumbbell in the opposite hand with arm extended. Row the weight up toward your hip, squeezing at the top. Lower with control.",t:"Keep your back flat and core braced. Think about driving your elbow to the ceiling."},
{n:"Face Pulls",s:3,r:"15",m:"Rear Delts, Upper Back",g:"Set a cable at face height with a rope attachment. Pull the rope toward your face, separating the ends as you pull. Squeeze your rear delts and upper back at the end.",t:"Great for posture and shoulder health. Keep it light and controlled."},
{n:"Barbell Curl",s:3,r:"10-12",m:"Biceps",g:"Stand with feet shoulder-width apart, gripping a barbell underhand. Curl the bar up toward your shoulders keeping elbows pinned at your sides. Lower slowly.",t:"Don't swing. If you need to use momentum, go lighter."},
{n:"Hammer Curls",s:3,r:"12 each",m:"Biceps, Brachialis",g:"Hold dumbbells at your sides with palms facing inward (neutral grip). Curl up one at a time or together, keeping wrists straight throughout.",t:"These build the thickness of your arms and forearm strength."},
]},
{day:"Tuesday",label:"Chest / Triceps / Shoulders",icon:"\u{1F525}",exercises:[
{n:"Dumbbell Bench Press",s:4,r:"10-12",m:"Chest",g:"Lie on a flat bench holding dumbbells above your chest, palms forward. Lower the weights to chest level with elbows at about 45\u00B0. Press back up, squeezing your chest at the top.",t:"Plant your feet firmly and maintain a slight arch in your lower back."},
{n:"Incline Dumbbell Press",s:3,r:"10-12",m:"Upper Chest",g:"Set the bench to about 30-45\u00B0. Press dumbbells up from chest level, arms angled slightly inward. Lower with control.",t:"Hits the upper chest which gives a fuller look. Don't go too steep on the incline."},
{n:"Cable Flyes",s:3,r:"12-15",m:"Chest",g:"Stand in the center of a cable machine with handles set at chest height. With a slight bend in your elbows, bring your hands together in front of you. Slowly open back up.",t:"Focus on the squeeze at the center. Keep it smooth — no jerking."},
{n:"Overhead Press (Dumbbell)",s:4,r:"10",m:"Shoulders",g:"Sit or stand holding dumbbells at shoulder height. Press them overhead until arms are fully extended. Lower back to shoulder level.",t:"Brace your core to protect your lower back. Don't flare your elbows out too wide."},
{n:"Lateral Raises",s:3,r:"15",m:"Side Delts",g:"Stand with dumbbells at your sides. Raise them out to the sides until arms are parallel to the ground. Lower slowly.",t:"Go light — side delts respond well to higher reps. Lead with your elbows, not your hands."},
{n:"Tricep Rope Pushdowns",s:3,r:"12-15",m:"Triceps",g:"Attach a rope to a high cable. Push down by extending your elbows, splitting the rope at the bottom. Slowly let it come back up.",t:"Keep your elbows locked at your sides. Squeeze at the bottom."},
{n:"Overhead Tricep Extension",s:3,r:"12",m:"Triceps",g:"Hold a dumbbell or rope attachment overhead with both hands. Lower behind your head by bending at the elbows. Extend back up.",t:"Keep your upper arms still — only your forearms should move."},
]},
{day:"Wednesday",label:"Legs (Glute Focus) + Core",icon:"\u{1F351}",exercises:[
{n:"Barbell Hip Thrust",s:4,r:"10-12",m:"Glutes",g:"Sit on the ground with your upper back against a bench and a loaded barbell over your hips. Drive through your heels to lift your hips until your body forms a straight line from shoulders to knees. Squeeze your glutes hard at the top. Lower slowly.",t:"This is your #1 glute builder. Use a pad on the bar. Push through your heels and pause at the top."},
{n:"Romanian Deadlift (RDL)",s:4,r:"10-12",m:"Hamstrings, Glutes",g:"Hold a barbell or dumbbells at hip level. Hinge at your hips, pushing them backward as the weight travels down your shins. Keep a slight bend in your knees. Return to standing by squeezing your glutes forward.",t:"You should feel a deep stretch in your hamstrings. Keep the bar close to your body. Don't round your back."},
{n:"Bulgarian Split Squat",s:3,r:"10 each",m:"Quads, Glutes",g:"Stand about 2 feet in front of a bench. Place one foot behind you on the bench. Lower your back knee toward the ground, keeping your front shin mostly vertical. Drive up through your front heel.",t:"Lean slightly forward to hit glutes more. These are tough — bodyweight is fine to start."},
{n:"Sumo Squat (Dumbbell)",s:3,r:"12-15",m:"Inner Thigh, Glutes",g:"Stand with feet wider than shoulder-width, toes pointed out. Hold a dumbbell at your center. Squat down keeping your knees tracking over your toes. Drive up and squeeze.",t:"Go deep if your mobility allows. Great for inner thighs and glute shaping."},
{n:"Cable Kickbacks",s:3,r:"15 each",m:"Glutes",g:"Attach an ankle strap to a low cable. Face the machine and kick one leg straight back, squeezing your glute at the top. Return slowly.",t:"Keep your core tight and don't arch your back. Slow and controlled wins here."},
{n:"Hanging Leg Raises",s:3,r:"12-15",m:"Lower Abs",g:"Hang from a bar with arms fully extended. Raise your legs (straight or bent) until they're parallel to the ground or higher. Lower with control.",t:"Don't swing. If straight legs are too hard, bend your knees."},
{n:"Cable Woodchops",s:3,r:"12 each",m:"Obliques, Core",g:"Set a cable high. Stand sideways to the machine. Pull the handle diagonally across your body from high to low in a chopping motion. Control the return.",t:"Rotate through your core, not your arms. Keep hips stable."},
{n:"Dead Bug",s:3,r:"10 each",m:"Deep Core",g:"Lie on your back with arms pointing to the ceiling and knees at 90\u00B0. Slowly extend one arm overhead and the opposite leg out straight, keeping your lower back pressed into the floor. Return and repeat other side.",t:"If your back arches off the floor, you've gone too far. This is amazing for building a stable core."},
]},
{day:"Thursday",label:"Back / Biceps + Core",icon:"\u{1F4AA}",exercises:[
{n:"Assisted Pull-Ups",s:4,r:"8-10",m:"Lats, Upper Back",g:"Use the assisted pull-up machine or a resistance band. Grip the bar overhand, wider than shoulder-width. Pull yourself up until your chin clears the bar. Lower slowly.",t:"Reduce the assistance over time as you get stronger. These build serious back definition."},
{n:"T-Bar Row",s:4,r:"10-12",m:"Mid Back, Lats",g:"Straddle the T-bar. Bend at the hips, keeping your back flat. Row the weight up to your chest, squeezing your back. Lower with control.",t:"Great compound movement. Keep your core braced throughout."},
{n:"Straight-Arm Pulldown",s:3,r:"12-15",m:"Lats",g:"Stand facing a cable machine with a straight bar attached at the top. With arms nearly straight, push the bar down in an arc to your thighs. Slowly return.",t:"Really isolates the lats. Keep the motion smooth and deliberate."},
{n:"Reverse Flyes",s:3,r:"15",m:"Rear Delts",g:"Bend over at the hips or use a reverse fly machine. With a slight bend in your elbows, raise the weights out to the sides. Squeeze your upper back.",t:"Great for posture. Go light and feel the contraction."},
{n:"Incline Dumbbell Curl",s:3,r:"10-12",m:"Biceps (long head)",g:"Sit on an incline bench (45\u00B0) with dumbbells hanging at your sides. Curl up while keeping your upper arms still. Lower fully for a good stretch.",t:"The incline gives an incredible stretch at the bottom — amazing for bicep growth."},
{n:"Cable Curl",s:3,r:"12-15",m:"Biceps",g:"Attach a straight or EZ bar to a low cable. Curl up keeping elbows at your sides. Squeeze at the top and lower slowly.",t:"Cables provide constant tension through the whole range of motion."},
{n:"Plank (Weighted)",s:3,r:"30-45 sec",m:"Core",g:"Get into a forearm plank position. Keep your body in a straight line from head to heels. Brace your core as if someone were about to push you. Hold.",t:"Don't let your hips sag or pike up. Breathe steadily."},
{n:"Bicycle Crunches",s:3,r:"20 each",m:"Abs, Obliques",g:"Lie on your back with hands behind your head. Bring one knee toward your chest while twisting to touch the opposite elbow to it. Alternate sides in a pedaling motion.",t:"Slow and controlled. Don't pull on your neck — the rotation comes from your core."},
]},
{day:"Friday",label:"Chest / Triceps / Shoulders",icon:"\u{1F525}",exercises:[
{n:"Barbell Bench Press",s:4,r:"8-10",m:"Chest",g:"Lie on a flat bench, gripping the bar slightly wider than shoulder-width. Unrack and lower the bar to your mid-chest. Press up explosively. Lock out at the top.",t:"Squeeze your shoulder blades together for stability. Have a spotter if going heavy."},
{n:"Dumbbell Chest Fly",s:3,r:"12",m:"Chest",g:"Lie on a flat bench with dumbbells pressed above your chest. Open your arms wide with a slight bend in your elbows, feeling a stretch across your chest. Bring them back together.",t:"Don't go too deep — stop when you feel a good stretch. Think about hugging a big tree."},
{n:"Machine Shoulder Press",s:4,r:"10-12",m:"Shoulders",g:"Sit with your back supported. Grip the handles at shoulder height. Press up until arms are almost locked. Lower back to start.",t:"Machines are great for shoulder pressing safely and with good form."},
{n:"Front Raises",s:3,r:"12",m:"Front Delts",g:"Hold dumbbells at your thighs with palms facing back. Raise one or both arms straight in front of you to shoulder height. Lower slowly.",t:"Go light. Alternate arms if needed to maintain control."},
{n:"Rear Delt Fly Machine",s:3,r:"15",m:"Rear Delts",g:"Sit facing the machine pad. Push the handles outward and back, squeezing your rear delts. Return slowly.",t:"Keeps rear delts balanced with the front and side — important for shoulder health."},
{n:"Close-Grip Bench Press",s:3,r:"10-12",m:"Triceps, Chest",g:"Lie on a bench gripping the bar at shoulder-width or slightly narrower. Lower the bar to your chest keeping elbows close. Press up.",t:"Emphasizes triceps more than regular bench. Don't go too narrow or it'll hurt your wrists."},
{n:"Skull Crushers",s:3,r:"12",m:"Triceps",g:"Lie on a bench holding an EZ bar or dumbbells above your chest. Bend only at the elbows to lower the weight toward your forehead. Extend back up.",t:"Keep your upper arms vertical. Go light until you're comfortable with the movement."},
]},
{day:"Saturday",label:"Legs (Glute Focus) + Core",icon:"\u{1F351}",exercises:[
{n:"Barbell Squat",s:4,r:"8-10",m:"Quads, Glutes",g:"Position the barbell on your upper traps. Stand with feet shoulder-width apart, toes slightly out. Squat down until your thighs are at least parallel to the ground. Drive up through your heels.",t:"Keep your chest up and core braced. Depth matters — try to get below parallel for maximum glute activation."},
{n:"Hip Thrust (Single Leg)",s:3,r:"10 each",m:"Glutes",g:"Set up like a normal hip thrust but extend one leg out straight. Drive through the planted heel to raise your hips. Squeeze at the top.",t:"Incredible for fixing glute imbalances. Use bodyweight or light weight to start."},
{n:"Walking Lunges",s:3,r:"12 each",m:"Quads, Glutes",g:"Hold dumbbells at your sides. Step forward and lower until both knees are at 90\u00B0. Push off the front foot and step into the next lunge.",t:"Take longer steps to bias glutes, shorter steps for quads. Stay upright."},
{n:"Leg Press (Feet High & Wide)",s:4,r:"12",m:"Glutes, Hamstrings",g:"Sit in the leg press with feet placed high and wide on the platform. Lower the weight until your knees are at about 90\u00B0. Press back up.",t:"High and wide foot placement targets glutes and hamstrings more than a standard position."},
{n:"Glute Bridge (Banded)",s:3,r:"20",m:"Glutes",g:"Place a resistance band just above your knees. Lie on your back with feet flat. Drive your hips up, pushing your knees out against the band. Squeeze and hold at the top.",t:"High-rep burnout to finish off glutes. The band forces your glute medius to fire."},
{n:"Ab Rollout",s:3,r:"10-12",m:"Core",g:"Kneel on the ground with the ab wheel or a loaded barbell in front of you. Roll forward, extending your body as far as you can control. Pull back to the starting position using your core.",t:"Only go as far as you can without your hips sagging. This is one of the best core exercises there is."},
{n:"Russian Twists",s:3,r:"20 total",m:"Obliques",g:"Sit on the floor with knees bent and feet slightly elevated. Hold a weight or medicine ball at your chest. Rotate side to side, touching the weight near the ground on each side.",t:"Keep your chest lifted. The rotation should come from your torso, not your arms."},
{n:"Plank to Downward Dog",s:3,r:"10",m:"Core, Shoulders",g:"Start in a high plank. Push your hips up and back into a downward dog position, then return to plank. Move slowly and deliberately.",t:"Great for core stability and a nice stretch. A perfect finisher."},
]},
{day:"Sunday",label:"Rest & Recover",icon:"\u{1F634}",exercises:[]},
];

// ─── STATE ───
const dayNames=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const todayName=dayNames[new Date().getDay()];
const todayIdx=PLAN.findIndex(w=>w.day===todayName);

let state={
  tab:"today",
  selectedDay:todayIdx>=0?todayIdx:0,
  completedSets:{},
  weights:{},
  logs:[],
  workoutHistory:[],
  restSeconds:90,
  timerOpen:false,
  guideExercise:null,
  openGuideDay:null,
  trackView:"log",
  expandedHist:null,
};

// Timer state
let timerRemaining=0,timerRunning=false,timerInterval=null;

function startTimer(){
  timerRemaining=state.restSeconds;
  timerRunning=true;
  state.timerOpen=true;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(timerRunning&&timerRemaining>0){timerRemaining--;renderTimer()}
    if(timerRemaining<=0){timerRunning=false;clearInterval(timerInterval);renderTimer()}
  },1000);
  render();
}

function renderTimer(){
  const el=document.getElementById("timer-display");
  if(!el)return;
  const pct=((state.restSeconds-timerRemaining)/state.restSeconds)*100;
  const m=Math.floor(timerRemaining/60),s=timerRemaining%60;
  const circ=2*Math.PI*70;
  el.innerHTML=`
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle cx="80" cy="80" r="70" fill="none" stroke="#F5F5F4" stroke-width="8"/>
      <circle cx="80" cy="80" r="70" fill="none" stroke="${timerRemaining<=0?'#6B8F71':'#7C6F64'}" stroke-width="8"
        stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}" stroke-linecap="round" transform="rotate(-90 80 80)"
        class="timer-ring"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
      <span style="font-size:40px;font-weight:300;color:${timerRemaining<=0?'#6B8F71':'#1C1917'};font-variant-numeric:tabular-nums">${m}:${String(s).padStart(2,'0')}</span>
      ${timerRemaining<=0?'<span style="font-size:13px;color:#6B8F71;font-weight:600;margin-top:4px">GO!</span>':''}
    </div>`;
  // Update pause/play button text
  const pb=document.getElementById("timer-toggle");
  if(pb)pb.innerHTML=`<span style="width:16px;height:16px;display:inline-flex">${timerRunning?ICO.pause:ICO.play}</span>${timerRunning?'Pause':'Resume'}`;
}

// ─── SVG CHARTS ───
function drawLineChart(data,key,color,w,h){
  if(data.length<2)return'<div style="text-align:center;padding:30px;color:#A8A29E">Need more data</div>';
  const vals=data.map(d=>d[key]).filter(v=>v!=null);
  if(vals.length<2)return'<div style="text-align:center;padding:30px;color:#A8A29E">Need more data</div>';
  const min=Math.min(...vals)-2,max=Math.max(...vals)+2;
  const pad={t:10,r:10,b:30,l:40};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  const pts=data.filter(d=>d[key]!=null).map((d,i,arr)=>{
    const x=pad.l+(i/(arr.length-1))*cw;
    const y=pad.t+ch-(((d[key]-min)/(max-min))*ch);
    return{x,y,label:d.date,val:d[key]};
  });
  let svg=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
  // Grid lines
  for(let i=0;i<5;i++){
    const y=pad.t+(ch/4)*i;
    const v=max-((max-min)/4)*i;
    svg+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#F5F5F4" stroke-width="1"/>`;
    svg+=`<text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#A8A29E">${Math.round(v)}</text>`;
  }
  // X labels
  pts.forEach((p,i)=>{if(i%Math.max(1,Math.floor(pts.length/5))===0||i===pts.length-1)
    svg+=`<text x="${p.x}" y="${h-6}" text-anchor="middle" font-size="10" fill="#A8A29E">${p.label}</text>`;
  });
  // Line
  const pathD=pts.map((p,i)=>(i===0?'M':'L')+p.x+','+p.y).join(' ');
  svg+=`<path d="${pathD}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  // Dots
  pts.forEach(p=>svg+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${color}"/>`);
  svg+=`</svg>`;
  return svg;
}

function drawBarChart(data,key,color,w,h){
  const vals=data.map(d=>d[key]).filter(v=>v!=null);
  if(vals.length<1)return'<div style="text-align:center;padding:30px;color:#A8A29E">Need more data</div>';
  const max=Math.max(...vals)*1.15||150;
  const pad={t:10,r:10,b:30,l:40};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;
  const filtered=data.filter(d=>d[key]!=null);
  const bw=Math.min(24,cw/filtered.length-4);
  let svg=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
  for(let i=0;i<5;i++){
    const y=pad.t+(ch/4)*i;
    const v=max-((max)/4)*i;
    svg+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#F5F5F4" stroke-width="1"/>`;
    svg+=`<text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="10" fill="#A8A29E">${Math.round(v)}</text>`;
  }
  filtered.forEach((d,i)=>{
    const x=pad.l+(i+.5)*(cw/filtered.length)-bw/2;
    const bh=(d[key]/max)*ch;
    const y=pad.t+ch-bh;
    svg+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="4" fill="${color}"/>`;
    if(i%Math.max(1,Math.floor(filtered.length/6))===0||i===filtered.length-1)
      svg+=`<text x="${x+bw/2}" y="${h-6}" text-anchor="middle" font-size="10" fill="#A8A29E">${d.date}</text>`;
  });
  svg+=`</svg>`;
  return svg;
}

// ─── CHECK COMPLETION ───
function checkCompletion(){
  PLAN.forEach((w,di)=>{
    if(!w.exercises.length)return;
    const total=w.exercises.reduce((s,ex)=>s+ex.s,0);
    const done=w.exercises.reduce((s,ex,ei)=>{
      let c=0;for(let si=0;si<ex.s;si++)if(state.completedSets[di+'-'+ei+'-'+si])c++;return s+c;
    },0);
    if(done===total&&total>0){
      const d=new Date().toISOString().slice(0,10);
      if(!state.workoutHistory.find(h=>h.date===d&&h.di===di)){
        state.workoutHistory.unshift({date:d,di,label:w.label,icon:w.icon,
          setsCompleted:done,totalSets:total,
          exercises:w.exercises.map((ex,ei)=>({name:ex.n,sets:ex.s,
            done:Array.from({length:ex.s}).filter((_,si)=>state.completedSets[di+'-'+ei+'-'+si]).length,
            weight:state.weights[di+'-'+ei]||null}))
        });
      }
    }
  });
}

// ─── RENDER ───
function render(){
  const app=document.getElementById('app');
  let html=`
  <div class="topbar">
    <div><h2>FitTrack</h2><div class="sub">Your Gym Companion</div></div>
    <div class="week-badge"><span style="width:13px;height:13px;display:inline-flex;color:#7C6F64">${ICO.flame}</span>Week ${Math.ceil(new Date().getDate()/7)}</div>
  </div>
  <div class="content" id="content">`;

  if(state.tab==='today') html+=renderToday();
  else if(state.tab==='week') html+=renderWeek();
  else if(state.tab==='guide') html+=renderGuide();
  else if(state.tab==='track') html+=renderTrack();
  else if(state.tab==='history') html+=renderHistory();

  html+=`</div>`;
  html+=renderTabBar();

  // Modals
  if(state.guideExercise) html+=renderExerciseModal();
  if(state.timerOpen) html+=renderTimerModal();

  app.innerHTML=html;

  // After render, start timer display update
  if(state.timerOpen)renderTimer();
}

function renderTabBar(){
  const tabs=[{id:'today',label:'Today',ico:ICO.dumbbell},{id:'week',label:'Schedule',ico:ICO.calendar},{id:'guide',label:'Guide',ico:ICO.book},{id:'track',label:'Track',ico:ICO.trend},{id:'history',label:'History',ico:ICO.history}];
  return`<nav class="tab-nav">${tabs.map(t=>`<button class="tab-btn${state.tab===t.id?' active':''}" onclick="setTab('${t.id}')"><span style="width:20px;height:20px;display:inline-flex">${t.ico}</span><span>${t.label}</span></button>`).join('')}</nav>`;
}

function renderToday(){
  const w=PLAN[state.selectedDay];
  if(!w.exercises.length)return`<div class="empty"><div style="font-size:64px;margin-bottom:16px">\u{1F634}</div><h2 style="color:#1C1917;font-size:22px">Rest Day</h2><p style="font-size:15px;color:#57534E;line-height:1.6;max-width:280px;margin:12px auto 0">Your muscles grow during rest. Stretch, hydrate, get your protein in, and come back stronger tomorrow.</p></div>`;
  const total=w.exercises.reduce((s,ex)=>s+ex.s,0);
  const done=w.exercises.reduce((s,ex,ei)=>{let c=0;for(let si=0;si<ex.s;si++)if(state.completedSets[state.selectedDay+'-'+ei+'-'+si])c++;return s+c},0);
  const pct=total>0?Math.round(done/total*100):0;
  let h=`<div style="margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <span style="font-size:28px">${w.icon}</span>
      <div><p style="font-size:13px;color:#A8A29E;font-weight:500">${w.day}</p><h1 style="font-size:22px;font-weight:700">${w.label}</h1></div>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${pct===100?'#6B8F71':'#7C6F64'}"></div></div>
    <p style="font-size:12px;color:#A8A29E;margin-top:6px">${done}/${total} sets completed (${pct}%)</p>
  </div>`;
  // Rest timer selector
  h+=`<div class="rest-sel"><span style="width:14px;height:14px;display:inline-flex;color:#A8A29E">${ICO.timer}</span><span>Rest timer:</span>`;
  [60,90,120].forEach(s=>{h+=`<button class="rest-opt${state.restSeconds===s?' active':''}" onclick="state.restSeconds=${s};render()">${s}s</button>`});
  h+=`</div>`;
  // Exercise cards
  w.exercises.forEach((ex,ei)=>{
    const allDone=Array.from({length:ex.s}).every((_,si)=>state.completedSets[state.selectedDay+'-'+ei+'-'+si]);
    h+=`<div class="ex-card${allDone?' done':''}">
      <div class="ex-header">
        <div style="flex:1">
          <div class="ex-name">${ex.n}<button class="ex-info-btn" onclick="showGuide(${state.selectedDay},${ei})"><span style="width:14px;height:14px;display:inline-flex">${ICO.info}</span></button></div>
          <div class="ex-meta">${ex.m} \u00B7 ${ex.s} \u00D7 ${ex.r}</div>
        </div>
        <input class="wt-input" type="number" placeholder="lbs" value="${state.weights[state.selectedDay+'-'+ei]||''}" onchange="setWeight(${state.selectedDay},${ei},this.value)">
      </div>
      <div class="set-row">`;
    for(let si=0;si<ex.s;si++){
      const ck=state.completedSets[state.selectedDay+'-'+ei+'-'+si];
      h+=`<button class="set-btn${ck?' checked':''}" onclick="toggleSet(${state.selectedDay},${ei},${si})">${ck?'<span style="width:16px;height:16px;display:inline-flex">'+ICO.check+'</span>':'Set '+(si+1)}</button>`;
    }
    h+=`</div></div>`;
  });
  return h;
}

    h+=`<div class="protein-box">

// ─── ACTIONS ───
function setTab(t){state.tab=t;render()}
function selectDay(i){state.selectedDay=i;state.tab='today';render()}

function toggleSet(di,ei,si){
  const key=di+'-'+ei+'-'+si;
  if(state.completedSets[key]){delete state.completedSets[key]}
  else{state.completedSets[key]=true;startTimer()}
  checkCompletion();
  render();
}

function setWeight(di,ei,val){state.weights[di+'-'+ei]=val}

function showGuide(di,ei){
  const ex=PLAN[di].exercises[ei];
  state.guideExercise=ex;
  render();
}

function toggleGuideDay(i){state.openGuideDay=state.openGuideDay===i?null:i;render()}

function saveLog(){
  const wEl=document.getElementById('wt-log');
  const pEl=document.getElementById('pr-log');
  if(!wEl||!pEl)return;
  const w=parseFloat(wEl.value),p=parseFloat(pEl.value);
  if(isNaN(w)&&isNaN(p))return;
  const today=new Date().toISOString().slice(0,10);
  const todayLog=state.logs.find(l=>l.date===today);
  state.logs=state.logs.filter(l=>l.date!==today);
  state.logs.push({date:today,weight:isNaN(w)?(todayLog&&todayLog.weight||null):w,protein:isNaN(p)?(todayLog&&todayLog.protein||null):p});
  state.logs.sort((a,b)=>a.date.localeCompare(b.date));
  render();
}

function closeTimer(){state.timerOpen=false;timerRunning=false;clearInterval(timerInterval);render()}
function toggleTimer(){timerRunning=!timerRunning;if(timerRunning&&timerRemaining>0){timerInterval=setInterval(()=>{if(timerRunning&&timerRemaining>0){timerRemaining--;renderTimer()}if(timerRemaining<=0){timerRunning=false;clearInterval(timerInterval);renderTimer()}},1000)}else{clearInterval(timerInterval)}renderTimer()}
function resetTimer(){timerRemaining=state.restSeconds;timerRunning=true;clearInterval(timerInterval);timerInterval=setInterval(()=>{if(timerRunning&&timerRemaining>0){timerRemaining--;renderTimer()}if(timerRemaining<=0){timerRunning=false;clearInterval(timerInterval);renderTimer()}},1000);renderTimer()}

// ─── INIT ───
render();
</script>
</body>
</html>
